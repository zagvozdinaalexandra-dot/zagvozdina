<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - CyberAware</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
        }

        .split-screen {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        /* Левая часть - Изображение */
        .left-side {
            flex: 60;
            background-image: url('images/222.png');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .left-side::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        /* Правая часть - Формы */
        .right-side {
            flex: 40;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 25%, #7e22ce 50%, #ec4899 75%, #f97316 100%);
            background-size: 400% 400%;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        .auth-form {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(248, 249, 250, 0.95) 100%);
            padding: 3rem 2.5rem;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(0, 168, 255, 0.1);
        }

        .auth-form h2 {
            font-size: 2rem;
            color: #0056b3;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .auth-form h2::before {
            content: '';
            width: 4px;
            height: 30px;
            background: linear-gradient(135deg, #00a8ff, #0056b3);
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            font-weight: 600;
            color: #003366;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.95rem 1rem;
            border: 2px solid rgba(0, 168, 255, 0.2);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: var(--transition);
            background-color: rgba(0, 168, 255, 0.05);
            color: #333;
            height: 45px;
            box-sizing: border-box;
            display: block;
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #00a8ff, #0056b3);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0, 168, 255, 0.3);
            margin-top: 0.5rem;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 1.5rem;
            color: #666;
            font-size: 0.95rem;
        }

        .auth-toggle a {
            color: #00a8ff;
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .left-side { display: none; }
            .auth-form { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="scroll-progress"><div class="scroll-progress-bar"></div></div>

    <div class="split-screen">
        <div class="left-side"></div>

        <div class="right-side">
            <div class="auth-container">
                <div id="register-form" class="auth-form">
                    <h2>Регистрация</h2>
                    <form id="register-form-element">
                        <div class="form-group">
                            <label>Полное имя</label>
                            <input type="text" placeholder="Иван Иванов" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input id="register-email" type="email" placeholder="example@mail.com" required>
                        </div>
                        <div class="form-group">
                            <label>Пароль</label>
                            <input id="register-password" type="password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn-submit">Создать аккаунт</button>
                    </form>
                    <p id="register-error" style="color:#dc2626; margin-top:0.75rem; text-align:center;"></p>
                    <div class="auth-toggle">
                        <p>Уже есть аккаунт? <a href="auth.html" id="show-login">Войти</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="translations.js"></script>
    <script src="script.js"></script>
</body>
</html>
